<!DOCTYPE html>
<html>
<head>
    <title>Hệ thống Quản lý Cây xanh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
</head>
<body>
    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="#">🌳 Urban Green GIS</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <div id="map" style="height: 500px; border: 2px solid #ccc;"></div>
            </div>
            <div class="col-md-4">
                <h3>Công cụ GIS</h3>
                <form method="get">
                    <input type="text" class="form-control" placeholder="Tìm kiếm cây...">
                    <button class="btn btn-primary mt-2">Tìm kiếm</button>
                    <button class="btn btn-warning mt-2">Quét bán kính 500m</button>
                </form>
                <hr>
                <div class="alert alert-info">
                    Tổng số cây hiển thị: {{ trees|length }}
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        // Code hiển thị bản đồ sẽ nằm ở đây
        var map = L.map('map').setView([10.8231, 106.6297], 13); // Tọa độ TP.HCM
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    </script>
</body>
</html>
