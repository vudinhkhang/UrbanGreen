<!DOCTYPE html>
<html>
<head>
    <title>Hệ thống Quản lý Cây xanh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
</head>
<body>
    <nav class="navbar navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="#">🌳 Urban Green GIS</a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <div id="map" style="height: 500px; border: 2px solid #ccc;"></div>
            </div>
            <div class="col-md-4">
                <h3>Công cụ GIS</h3>
                <form method="get">
                    <input type="text" class="form-control" placeholder="Tìm kiếm cây...">
                    <button class="btn btn-primary mt-2">Tìm kiếm</button>
                    <button class="btn btn-warning mt-2">Quét bán kính 500m</button>
                </form>
                <hr>
                <div class="alert alert-info">
                    Tổng số cây hiển thị: {{ trees|length }}
                </div>
            </div>
        </div>
    </div>

<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    
    <script>
        // 1. Khởi tạo bản đồ (Tọa độ trung tâm TP.HCM)
        var map = L.map('map').setView([10.8231, 106.6297], 13); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 2. HỨNG DỮ LIỆU TỪ PYTHON GỬI SANG
        // Chú ý: lệnh |safe là bắt buộc để Django không mã hóa ký tự đặc biệt
        var treeData = {{ tree_json|safe }};

        // 3. VÒNG LẶP: Duyệt qua từng cây và vẽ lên bản đồ
        treeData.forEach(function(tree) {
            
            // Chọn màu sắc marker dựa theo trạng thái (Logic GIS đơn giản)
            var color = 'blue';
            if (tree.status === 'SAU_BENH') color = 'red';
            if (tree.status === 'NGUY_HIEM') color = 'black';

            // Tạo mã HTML cho ảnh (Nếu có link ảnh thì hiện thẻ img, không thì thôi)
            var imageHtml = '';
            if (tree.image) {
                imageHtml = `<img src="${tree.image}" style="width: 100%; height: auto; margin-top: 10px; border-radius: 5px;">`;
            }

            // Tạo Marker
            var marker = L.marker([tree.lat, tree.long]).addTo(map);
            
            // Tạo Popup khi click vào
            marker.bindPopup(`
                <b>Mã: ${tree.code}</b><br>
                Loài: ${tree.name}<br>
                Chiều cao: ${tree.height}m<br>
                Trạng thái: <span style="color:${color}">${tree.status}</span><br>
                ${imageHtml} 
            `);
        });
    </script>
</body>
</html>
