{% extends "base.html" %}

{% block title %}Thêm Loài Cây{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h3>Thêm Loài Cây Mới</h3>
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Tên loài</label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Đặc tính (tuỳ chọn)</label>
                            <textarea name="characteristics" class="form-control" rows="4"></textarea>
                        </div>
                        <button class="btn btn-primary">Lưu</button>
                        <a href="{% url 'species_list' %}" class="btn btn-secondary">Hủy</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
