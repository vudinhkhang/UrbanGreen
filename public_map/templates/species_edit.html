{% extends "base.html" %}

{% block title %}Sửa Loài Cây{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="page-header">
        <div>
            <h2 class="page-title"><i class="fas fa-edit"></i> Sửa Loài Cây</h2>
            <p class="page-subtitle">Cập nhật thông tin loài: {{ species.name }}</p>
        </div>
        <div class="page-actions">
            <a href="{% url 'species_list' %}" class="btn btn-outline-secondary">
                <i class="fas fa-list"></i> Danh sách loài
            </a>
        </div>
    </div>
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Tên loài</label>
                            <input type="text" name="name" class="form-control" value="{{ species.name }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Đặc tính (tuỳ chọn)</label>
                            <textarea name="characteristics" class="form-control" rows="3" placeholder="Mô tả đặc tính chung của loài...">{{ species.characteristics|default:'' }}</textarea>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Chu kỳ tưới nước (ngày)</label>
                                <input type="number" name="watering_frequency_days" class="form-control" value="{{ species.watering_frequency_days }}" min="1">
                                <small class="text-muted">Số ngày giữa mỗi lần tưới</small>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Chu kỳ kiểm tra (ngày)</label>
                                <input type="number" name="inspection_frequency_days" class="form-control" value="{{ species.inspection_frequency_days }}" min="1">
                                <small class="text-muted">Số ngày giữa mỗi lần kiểm tra</small>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Đặc tính cảnh báo</label>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" name="is_pest_prone" id="isPestProne" {% if species.is_pest_prone %}checked{% endif %}>
                                        <label class="form-check-label" for="isPestProne">
                                            <i class="fas fa-bug text-warning"></i> Dễ bị sâu bệnh
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" name="is_fall_prone" id="isFallProne" {% if species.is_fall_prone %}checked{% endif %}>
                                        <label class="form-check-label" for="isFallProne">
                                            <i class="fas fa-wind text-danger"></i> Dễ đổ / gãy
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" name="is_fast_growing" id="isFastGrowing" {% if species.is_fast_growing %}checked{% endif %}>
                                        <label class="form-check-label" for="isFastGrowing">
                                            <i class="fas fa-arrows-up-down text-success"></i> Mọc nhanh (cần cắt tỉa)
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" name="is_drought_sensitive" id="isDroughtSensitive" {% if species.is_drought_sensitive %}checked{% endif %}>
                                        <label class="form-check-label" for="isDroughtSensitive">
                                            <i class="fas fa-sun text-warning"></i> Nhạy cảm hạn hán
                                        </label>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" name="is_invasive_roots" id="isInvasiveRoots" {% if species.is_invasive_roots %}checked{% endif %}>
                                        <label class="form-check-label" for="isInvasiveRoots">
                                            <i class="fas fa-diagram-project text-secondary"></i> Rễ xâm lấn
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button class="btn btn-primary">Lưu</button>
                        <a href="{% url 'species_list' %}" class="btn btn-secondary">Hủy</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
