{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Urban Green</title>
    <link rel="icon" type="image/png" href="https://urbangreen.vn/wp-content/themes/urban-green/img/favicons/favicon-32x32.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ug-teal: #1abc9c;
            --ug-teal-dark: #16a085;
            --ug-dark: #2c3d50;
        }
        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, var(--ug-dark) 0%, #1a252f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-logo i {
            font-size: 2.5rem;
            color: var(--ug-teal);
        }
        .login-logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--ug-dark);
            margin: .5rem 0 .3rem;
        }
        .login-logo p {
            color: #9ca3af;
            font-size: .9rem;
        }
        .form-label {
            font-weight: 600;
            color: var(--ug-dark);
            font-size: .9rem;
        }
        .form-control {
            border-radius: 8px;
            padding: .7rem 1rem;
            border: 1.5px solid #e5e7eb;
            transition: border-color .2s, box-shadow .2s;
        }
        .form-control:focus {
            border-color: var(--ug-teal);
            box-shadow: 0 0 0 3px rgba(26,188,156,.15);
        }
        .btn-login {
            background: var(--ug-teal);
            border: none;
            color: #fff;
            font-weight: 700;
            padding: .75rem;
            border-radius: 8px;
            width: 100%;
            font-size: 1.05rem;
            transition: background .2s, transform .2s;
        }
        .btn-login:hover {
            background: var(--ug-teal-dark);
            color: #fff;
            transform: translateY(-1px);
        }
        .input-group-text {
            background: #f9fafb;
            border: 1.5px solid #e5e7eb;
            border-right: none;
            border-radius: 8px 0 0 8px;
            color: #9ca3af;
        }
        .input-group .form-control {
            border-left: none;
            border-radius: 0 8px 8px 0;
        }
        .alert {
            border-radius: 8px;
            font-size: .88rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="fas fa-leaf"></i>
            <h1>Urban Green</h1>
            <p>Hệ thống Quản lý Cây Xanh Đô thị</p>
        </div>

        <div class="alert" style="background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;text-align:center;">
            <i class="fas fa-shield-halved" style="color:var(--ug-teal);"></i>
            Bạn cần <strong>tài khoản nhân viên</strong> để truy cập vào hệ thống.
        </div>

        {% if form.errors %}
        <div class="alert alert-danger">
            <i class="fas fa-exclamation-circle"></i>
            Tên đăng nhập hoặc mật khẩu không đúng.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Tên đăng nhập</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập" autofocus required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Mật khẩu</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
                </div>
            </div>
            <button type="submit" class="btn btn-login">
                <i class="fas fa-sign-in-alt"></i> Đăng nhập
            </button>
        </form>
    </div>
</body>
</html>
